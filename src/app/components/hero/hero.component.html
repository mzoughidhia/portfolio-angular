<section class="hero" id="home">
  <div class="hero-bg">
    <div class="particles" id="particles"></div>
  </div>
  <div class="hero-content">
    <div class="hero-text">
      <p class="hero-greeting">Hello, I'm</p>
      <h1 class="hero-name">
        <span class="name-first">Mohamed Dhia</span>
        <span class="name-last">Mzoughi</span>
      </h1>
      <div class="hero-title">
        <span class="typing-text">{{ typingText }}</span>
        <span class="cursor">|</span>
      </div>
      <p class="hero-location">
        <i class="fas fa-map-marker-alt"></i> El Mourouj, Ben Arous, Tunisia
      </p>
      <div class="hero-buttons">
        <button class="btn btn-primary" (click)="scrollToSection('projects')">View My Work</button>
        <button class="btn btn-secondary" (click)="scrollToSection('contact')">Get In Touch</button>
      </div>
      <div class="hero-social">
        <a href="mailto:meddhiamzoughi48@gmail.com" class="social-link" title="Email">
          <i class="fas fa-envelope"></i>
        </a>
        <a href="tel:+21692836236" class="social-link" title="Phone">
          <i class="fas fa-phone"></i>
        </a>
        <a href="#" class="social-link" title="GitHub">
          <i class="fab fa-github"></i>
        </a>
        <a href="#" class="social-link" title="LinkedIn">
          <i class="fab fa-linkedin"></i>
        </a>
      </div>
    </div>
    <div class="hero-image">
      <div class="avatar-container">
        <div class="avatar-ring"></div>
        <div class="avatar-inner">
          <span class="avatar-initials">MDM</span>
        </div>
        <div class="floating-badge badge-1">
          <i class="fab fa-python"></i>
          <span>Python</span>
        </div>
        <div class="floating-badge badge-2">
          <i class="fab fa-laravel"></i>
          <span>Laravel</span>
        </div>
        <div class="floating-badge badge-3">
          <i class="fab fa-angular"></i>
          <span>Angular</span>
        </div>
        <div class="floating-badge badge-4">
          <i class="fas fa-brain"></i>
          <span>AI/ML</span>
        </div>
      </div>
    </div>
  </div>
  <div class="scroll-indicator">
    <div class="scroll-mouse">
      <div class="scroll-wheel"></div>
    </div>
    <span>Scroll Down</span>
  </div>
</section>
