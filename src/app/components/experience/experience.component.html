<section class="section experience" id="experience">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Work History</span>
      <h2 class="section-title">Experience</h2>
      <div class="section-line"></div>
    </div>
    <div class="experience-card animate-in" *ngFor="let exp of experiences">
      <div class="exp-header">
        <div class="exp-company">
          <div class="company-logo">
            <i [class]="exp.icon"></i>
          </div>
          <div class="company-info">
            <h3 class="exp-title">{{ exp.title }}</h3>
            <p class="exp-company-name">{{ exp.company }}</p>
          </div>
        </div>
        <div class="exp-meta">
          <span class="exp-date">
            <i class="fas fa-calendar"></i> {{ exp.period }}
          </span>
          <span class="exp-location">
            <i class="fas fa-map-marker-alt"></i> {{ exp.location }}
          </span>
        </div>
      </div>
      <div class="exp-body">
        <ul class="exp-tasks">
          <li *ngFor="let task of exp.tasks">
            <i class="fas fa-check-circle"></i>
            {{ task }}
          </li>
        </ul>
        <div class="exp-tech">
          <span class="tech-tag" *ngFor="let tech of exp.technologies">{{ tech }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
