<section class="section contact" id="contact">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Get In Touch</span>
      <h2 class="section-title">Contact Me</h2>
      <div class="section-line"></div>
    </div>
    <div class="contact-wrapper">
      <div class="contact-info animate-in">
        <h3 class="contact-subtitle">Let's work together</h3>
        <p class="contact-desc">
          I'm currently open to new opportunities. Whether you have a project in mind, a question, or just want to say hello, feel free to reach out!
        </p>
        <div class="contact-items">
          <a class="contact-item" *ngFor="let item of contactInfo"
             [href]="item.href || 'javascript:void(0)'"
             [class.no-link]="!item.href">
            <div class="contact-icon">
              <i [class]="item.icon"></i>
            </div>
            <div class="contact-item-info">
              <span class="contact-item-label">{{ item.label }}</span>
              <span class="contact-item-value">{{ item.value }}</span>
            </div>
          </a>
        </div>
        <div class="contact-social">
          <a [href]="link.href" class="social-link" [title]="link.label" *ngFor="let link of socialLinks">
            <i [class]="link.icon"></i>
          </a>
        </div>
      </div>
      <div class="contact-form-wrapper animate-in">
        <form class="contact-form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Your Name</label>
              <input type="text" id="name" name="name" [(ngModel)]="formData.name"
                     placeholder="Mohamed Dhia" required>
            </div>
            <div class="form-group">
              <label for="email">Your Email</label>
              <input type="email" id="email" name="email" [(ngModel)]="formData.email"
                     placeholder="email@example.com" required>
            </div>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" [(ngModel)]="formData.subject"
                   placeholder="Project Collaboration" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" [(ngModel)]="formData.message"
                      rows="5" placeholder="Tell me about your project..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-full" [disabled]="isSending">
            <span *ngIf="!isSending">
              <i class="fas fa-paper-plane"></i> Send Message
            </span>
            <span *ngIf="isSending">
              <i class="fas fa-spinner fa-spin"></i> Sending...
            </span>
          </button>
          <div class="form-success" [class.show]="showSuccess">
            <i class="fas fa-check-circle"></i>
            Message sent successfully! I'll get back to you soon.
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
